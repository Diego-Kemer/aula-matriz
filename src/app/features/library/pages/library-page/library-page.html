<section class="library-page">
  <div class="library-header">
    <h2>Biblioteca</h2>
  </div>

  <input class="library-search" type="text" placeholder="Buscar por tema" [(ngModel)]="search" />

  <div class="lesson-grid">
    @if (storage.loading()) {
      <p>Cargando...</p>
    }

    @if (storage.error()) {
      <p>{{ storage.error() }}</p>
    }
    @for (lesson of storage.lessons(); track lesson.id) {
      <app-lesson-card
        [lesson]="lesson"
        (edit)="editLesson($event)"
        (delete)="deleteLesson($event)"
        (duplicate)="duplicateLesson($event)"
      />
    }
  </div>
</section>
