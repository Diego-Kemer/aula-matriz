<div class="card" (click)="onView()">
  <h3>{{ lesson.theme }}</h3>
  <p>{{ lesson.subject }} - {{ lesson.course }}</p>

  <div class="meta">
    <span>{{ lesson.duration }}</span>
    <span class="status">{{ lesson.status }}</span>
  </div>

  <div class="actions">
    <button (click)="onEdit(); $event.stopPropagation()">✏️ Editar</button>
    <button (click)="onDuplicate(); $event.stopPropagation()">📄 Duplicar</button>
    <button (click)="onDelete(); $event.stopPropagation()">🗑️ Eliminar</button>
  </div>
</div>
